<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Roosterwijzigingen</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #1a1a1a;
      --surface:   #242424;
      --border:    #2e2e2e;
      --accent:    #e8634a;
      --accent2:   #d45a72;
      --text:      #e8e0d8;
      --muted:     #6b6560;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100dvh;
      overflow-y: auto;
      overscroll-behavior: none;
    }

    .page-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100dvh;
      width: 100%;
    }

    header {
      width: 100%;
      padding: 48px 24px 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .logo-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 6vw, 3.2rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .logo-sub {
      font-size: 0.75rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .dates {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      margin-top: 40px;
      width: 100%;
      max-width: 320px;
      padding: 0 24px;
    }

    .sectie-label {
      width: 100%;
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      padding-bottom: 4px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 2px;
    }

    .sectie-spacer { width: 100%; margin-top: 8px; }

    .date-btn {
      width: 100%;
      padding: 14px 28px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--accent);
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.18s ease;
      position: relative;
      overflow: hidden;
    }

    .date-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      opacity: 0;
      transition: opacity 0.18s ease;
    }

    .date-btn:hover::before,
    .date-btn.active::before { opacity: 0.12; }

    .date-btn.active { border-color: var(--accent); color: var(--accent); }
    .date-btn span { position: relative; z-index: 1; }

    /* ── PDF hok ── */
    .pdf-container {
      display: none;
      width: calc(100% - 48px);
      max-width: 700px;
      margin: 32px 24px 48px;
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      background: var(--surface);
    }

    .pdf-container.visible { display: block; }

    .pdf-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
    }

    .pdf-label {
      font-size: 0.8rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .pdf-close {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 1.2rem;
      cursor: pointer;
      transition: color 0.15s;
      line-height: 1;
    }
    .pdf-close:hover { color: var(--accent); }

    /* A4 verhouding — PDF past altijd volledig in het hok */
    .iframe-wrapper {
      width: 100%;
      aspect-ratio: 1 / 1.4142;
      position: relative;
      overflow: hidden;
      background: #fff;
    }

    .iframe-wrapper iframe {
      position: absolute;
      top: 0; left: 0;
      width: calc(100% + 17px);
      height: calc(100% + 17px);
      border: none;
    }

    /* Mobiel: geen iframe maar een "open" knop */
    .pdf-mobiel {
      display: none;
      padding: 32px 24px;
      text-align: center;
    }

    .pdf-mobiel a {
      display: inline-block;
      padding: 12px 28px;
      background: var(--accent);
      color: #fff;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 500;
      text-decoration: none;
    }

    /* Op touch-apparaten: verberg iframe, toon knop */
    @media (hover: none) and (pointer: coarse) {
      .iframe-wrapper { display: none; }
      .pdf-mobiel     { display: block; }
    }

    footer {
      margin-top: auto;
      padding: 24px;
      font-size: 0.75rem;
      color: var(--muted);
      text-align: center;
    }
  </style>
</head>
<body>
<div class="page-content">

  <header>
    <div class="logo-title">Roosterwijzigingen</div>
    <div class="logo-sub">Altena College</div>
  </header>

  <div class="dates" id="dates">
    <div class="sectie-label">Roosterwijzigingen</div>
    <div class="sectie-spacer"></div>
    <div class="sectie-label">Informatie</div>
    <button class="date-btn" id="infobordBtn" style="display:none" onclick="downloadInfobord()">
      <span id="infobordLabel">Infobord</span>
    </button>
  </div>

  <div class="pdf-container" id="pdfContainer">
    <div class="pdf-header">
      <span class="pdf-label" id="pdfLabel"></span>
      <button class="pdf-close" onclick="closePdf()">✕</button>
    </div>
    <!-- PC: iframe -->
    <div class="iframe-wrapper">
      <iframe id="pdfFrame" title="Roosterwijziging PDF"></iframe>
    </div>
    <!-- Mobiel: open in nieuw tabblad -->
    <div class="pdf-mobiel">
      <a id="pdfMobielLink" href="#" target="_blank">Bekijk roosterwijziging ↗</a>
    </div>
  </div>

  <footer>empowered by Joey Haks</footer>

</div>

<script>
  let cachedLinks  = null;
  let pdfCache     = {};
  let herlaadTimer = null;
  let activePdfMap = null;

  // ── Tijdschema ────────────────────────────────────────────────────
  function intervalVoorNu() {
    const nu  = new Date();
    const min = nu.getHours() * 60 + nu.getMinutes();
    if (min >= 7*60+30 && min < 8*60+30)  return 1  * 60 * 1000;
    if (min >= 8*60+30 && min < 10*60+5)  return 10 * 60 * 1000;
    if (min >= 10*60+5 && min < 18*60)    return 30 * 60 * 1000;
    return null; // nacht
  }

  function planHerlaad() {
    if (herlaadTimer) clearTimeout(herlaadTimer);
    const interval = intervalVoorNu();
    if (!interval) {
      // Slaap tot 07:30
      const nu  = new Date();
      const min = nu.getHours() * 60 + nu.getMinutes();
      let minTot730 = (7*60+30) - min;
      if (minTot730 <= 0) minTot730 += 24 * 60;
      herlaadTimer = setTimeout(function() { herlaadAlles(); planHerlaad(); }, minTot730 * 60 * 1000);
      return;
    }
    herlaadTimer = setTimeout(function() { herlaadAlles(); planHerlaad(); }, interval);
  }

  async function herlaadAlles() {
    await bouwKnoppen();
    if (activePdfMap) await laadPdf(activePdfMap, false);
  }

  // ── Links ─────────────────────────────────────────────────────────
  async function haalLinks(forceer) {
    if (cachedLinks && !forceer) return cachedLinks;
    const res = await fetch('/api/links');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    cachedLinks = await res.json();
    return cachedLinks;
  }

  async function bouwKnoppen() {
    const container = document.getElementById('dates');
    const spacer    = container.querySelector('.sectie-spacer');
    container.querySelectorAll('.datum-btn').forEach(b => b.remove());
    try {
      const links = await haalLinks(true);
      ['vandaag', 'morgen'].forEach(function(map) {
        const info = links[map];
        if (!info) return;
        const btn = document.createElement('button');
        btn.className = 'date-btn datum-btn';
        btn.setAttribute('data-map', map);
        btn.setAttribute('data-label', info.label);
        btn.onclick = function() { openPdf(this); };
        btn.innerHTML = '<span>' + info.label + '</span>';
        container.insertBefore(btn, spacer);
      });
      if (links.infobord) {
        document.getElementById('infobordLabel').textContent = links.infobord.label || 'Infobord';
        document.getElementById('infobordBtn').style.display = '';
      }
    } catch(e) {}
  }

  // ── PDF laden met ETag ────────────────────────────────────────────
  async function laadPdf(map, forceer) {
    const cached  = pdfCache[map];
    const headers = {};
    if (cached && !forceer) headers['If-None-Match'] = cached.etag;

    let res;
    try { res = await fetch('/api/proxy?map=' + map, { headers }); }
    catch(e) { return; }

    if (res.status === 304) return; // niet veranderd

    const etag = res.headers.get('ETag') || ('' + Date.now());
    const blob = await res.blob();
    const url  = URL.createObjectURL(blob);

    if (cached && cached.blobUrl) URL.revokeObjectURL(cached.blobUrl);
    pdfCache[map] = { blobUrl: url, etag, proxyUrl: '/api/proxy?map=' + map, label: document.querySelector('.date-btn.datum-btn[data-map="' + map + '"]')?.getAttribute('data-label') || map };

    if (map === activePdfMap) zetPdfInViewer(map);
  }

  function zetPdfInViewer(map) {
    const cached = pdfCache[map];
    if (!cached) return;

    // PC: blob in iframe, view=Fit zodat hele pagina past
    document.getElementById('pdfFrame').src =
      cached.blobUrl + '#toolbar=0&navpanes=0&scrollbar=0&view=Fit&pagemode=none';

    // Mobiel: directe link in nieuw tabblad met datum als tekst
    var link = document.getElementById('pdfMobielLink');
    link.href = cached.proxyUrl;
    link.textContent = 'Open ' + (cached.label || map) + ' ↗';
  }

  function openPdf(btn) {
    document.querySelectorAll('.date-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    const map   = btn.getAttribute('data-map');
    const label = btn.getAttribute('data-label');
    activePdfMap = map;

    document.getElementById('pdfLabel').textContent = label;
    document.getElementById('pdfContainer').classList.add('visible');
    document.getElementById('pdfContainer').scrollIntoView({ behavior: 'smooth', block: 'start' });

    if (pdfCache[map]) {
      zetPdfInViewer(map);
      laadPdf(map, false); // stille check op wijziging
    } else {
      laadPdf(map, true);
    }
  }

  function closePdf() {
    activePdfMap = null;
    document.getElementById('pdfContainer').classList.remove('visible');
    document.querySelectorAll('.date-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('pdfFrame').src = '';
  }

  function downloadInfobord() {
    const a = document.createElement('a');
    a.href = '/api/proxy?bestand=infobord';
    a.download = 'infobord.pptx';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  }

  bouwKnoppen();
  planHerlaad();
</script>
</body>
</html>
