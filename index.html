<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Roosterwijzigingen</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #1a1a1a;
      --surface:   #242424;
      --border:    #2e2e2e;
      --accent:    #e8634a;
      --accent2:   #d45a72;
      --text:      #e8e0d8;
      --muted:     #6b6560;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100dvh;
      overflow-y: auto;
      overscroll-behavior: none;
    }

    .page-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100dvh;
      width: 100%;
    }

    /* ── Header ── */
    header {
      width: 100%;
      padding: 48px 24px 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .logo-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 6vw, 3.2rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .logo-sub {
      font-size: 0.75rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ── Date buttons ── */
    .dates {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      margin-top: 40px;
      width: 100%;
      max-width: 320px;
      padding: 0 24px;
    }

    .sectie-label {
      width: 100%;
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      padding-bottom: 4px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 2px;
    }

    .sectie-spacer {
      width: 100%;
      margin-top: 8px;
    }

    .date-btn {
      width: 100%;
      padding: 14px 28px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--accent);
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.18s ease;
      position: relative;
      overflow: hidden;
    }

    .date-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      opacity: 0;
      transition: opacity 0.18s ease;
    }

    .date-btn:hover::before,
    .date-btn.active::before { opacity: 0.12; }

    .date-btn.active {
      border-color: var(--accent);
      color: var(--accent);
    }

    .date-btn span { position: relative; z-index: 1; }

    .status-msg {
      font-size: 0.85rem;
      color: var(--muted);
      text-align: center;
      padding: 4px 0;
    }
    .status-msg.fout { color: var(--accent); }

    /* ── PDF viewer ── */
    .pdf-container {
      display: none;
      width: calc(100% - 48px);
      max-width: 700px;
      margin: 32px 24px 48px;
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      background: var(--surface);
    }

    .pdf-container.visible { display: block; }

    .pdf-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
    }

    .pdf-label {
      font-size: 0.8rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .pdf-close {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 1.2rem;
      cursor: pointer;
      transition: color 0.15s;
      line-height: 1;
    }
    .pdf-close:hover { color: var(--accent); }

    .iframe-wrapper {
      width: 100%;
      /* A4 verhouding: hoogte = breedte × 1.4142 */
      aspect-ratio: 1 / 1.4142;
      position: relative;
    }

    .iframe-wrapper iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* ── Footer ── */
    footer {
      margin-top: auto;
      padding: 24px;
      font-size: 0.75rem;
      color: var(--muted);
      text-align: center;
    }
  </style>
</head>
<body>
<div class="page-content">

  <header>
    <div class="logo-title">Roosterwijzigingen</div>
    <div class="logo-sub">Altena College</div>
  </header>

  <div class="dates" id="dates">
    <div class="sectie-label">Roosterwijzigingen</div>

    <!-- Datum-knoppen komen hier via JS, vóór de spacer -->

    <div class="sectie-spacer"></div>
    <div class="sectie-label">Informatie</div>
    <button class="date-btn" id="infobordBtn" style="display:none" onclick="downloadInfobord()">
      <span id="infobordLabel">Infobord</span>
    </button>
  </div>

  <!-- PDF viewer — direct onder #dates, geen scroll -->
  <div class="pdf-container" id="pdfContainer">
    <div class="pdf-header">
      <span class="pdf-label" id="pdfLabel"></span>
      <button class="pdf-close" onclick="closePdf()">✕</button>
    </div>
    <div class="iframe-wrapper">
      <iframe id="pdfFrame" title="Roosterwijziging PDF"></iframe>
    </div>
  </div>

  <footer>empowered by Joey Haks</footer>

</div>

<script>
  let cachedLinks = null;

  async function haalLinks(forceer) {
    if (cachedLinks && !forceer) return cachedLinks;
    const res = await fetch('/api/links');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    cachedLinks = await res.json();
    return cachedLinks;
  }

  async function bouwKnoppen() {
    const container = document.getElementById('dates');
    const spacer    = container.querySelector('.sectie-spacer');

    // Verwijder oude datum-knoppen
    container.querySelectorAll('.datum-btn').forEach(function(b) { b.remove(); });

    // Tijdelijk laad-indicator invoegen vóór spacer
    const laadbericht = document.createElement('div');
    laadbericht.className = 'status-msg datum-btn';
    laadbericht.textContent = 'Laden…';
    container.insertBefore(laadbericht, spacer);

    try {
      const links = await haalLinks(true);

      // Verwijder laad-indicator
      laadbericht.remove();

      ['vandaag', 'morgen'].forEach(function(map) {
        const info = links[map];
        if (!info) return;

        const btn = document.createElement('button');
        btn.className = 'date-btn datum-btn';
        btn.setAttribute('data-map', map);
        btn.innerHTML = '<span>' + info.label + '</span>';
        btn.onclick = function() { openPdf(this, map, info.label); };
        container.insertBefore(btn, spacer);
      });

      // Als er helemaal geen knoppen zijn
      if (!container.querySelector('button.datum-btn')) {
        const msg = document.createElement('div');
        msg.className = 'status-msg datum-btn';
        msg.textContent = 'Geen roosterwijzigingen beschikbaar.';
        container.insertBefore(msg, spacer);
      }

      // Infobord knop
      if (links.infobord) {
        document.getElementById('infobordLabel').textContent = links.infobord.label || 'Infobord';
        document.getElementById('infobordBtn').style.display = '';
      }

    } catch (e) {
      laadbericht.className = 'status-msg fout datum-btn';
      laadbericht.textContent = 'Kon roosterwijzigingen niet ophalen.';
    }
  }

  function openPdf(btn, map, label) {
    document.querySelectorAll('.date-btn').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');

    document.getElementById('pdfLabel').textContent = label;
    document.getElementById('pdfFrame').src = '/api/proxy?map=' + map;
    document.getElementById('pdfContainer').classList.add('visible');
  }

  function closePdf() {
    document.getElementById('pdfContainer').classList.remove('visible');
    document.querySelectorAll('.date-btn').forEach(function(b) { b.classList.remove('active'); });
    document.getElementById('pdfFrame').src = '';
  }

  function downloadInfobord() {
    var a = document.createElement('a');
    a.href     = '/api/proxy?bestand=infobord';
    a.download = 'infobord.pptx';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  }

  // Start
  bouwKnoppen();

  // Refresh elke 5 minuten zodat nieuwe uploads automatisch verschijnen
  setInterval(bouwKnoppen, 5 * 60 * 1000);
</script>
</body>
</html>
